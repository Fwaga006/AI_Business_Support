<!DOCTYPE html>
<html>

<head>
<title>Business Dashboard</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
margin:0;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
}

.container{
padding:30px;
}

input{
padding:10px;
border-radius:6px;
}

#chats p{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px #ddd;
}

</style>

</head>

<body>
<div class="container">
<button onclick="logout()">Logout</button>

<h2 id="businessName">Business Dashboard</h2>

<h3 id="name"></h3>

<p>Your chatbot link:</p>

<a id="chatLink"></a>
<h3 id="stats">Total Chats: 0</h3>
<h3>Edit Business Information</h3>

<form id="editForm">

<input id="editName" placeholder="Business name">

<br><br>

<input id="editEmail" placeholder="Business email">

<br><br>

<button type="submit">Save Changes</button>

</form>
<div id="chats"></div>
</div>

<script>
async function loadChats(){

let response = await fetch(
"/history/" + businessId
);

let chats = await response.json();

let output = "";

chats.forEach(chat => {

output +=
"<p><b>Time:</b> " + chat.time + "</p>" +
"<p><b>You:</b> " + chat.customer + "</p>" +
"<p><b>AI:</b> " + chat.ai + "</p><hr>";

});

document.getElementById("chats").innerHTML = output;

}

loadChats();

let businessId = 1;


document.getElementById("chatLink").innerHTML =
"http://127.0.0.1:5000/chat-page/"+ businessId;


document.getElementById("chatLink").href =
"/chat-page/"+ businessId;
async function loadBusiness(){

    let response = await fetch(
        "/business/" + businessId
    );

    let data = await response.json();

    document.getElementById("businessName").innerHTML =
    data.name + " Dashboard";

}

loadBusiness();
async function loadStats(){

let response = await fetch(
"/stats/" + businessId
);

let data = await response.json();

document.getElementById("stats").innerHTML =
"Total Chats: " + data.total_chats;

}

loadStats();
function logout(){

    window.location = "/logout";

}
async function loadBusinessDetails(){

let response = await fetch(
"/business/" + businessId
);

let data = await response.json();

document.getElementById("editName").value = data.name;
document.getElementById("editEmail").value = data.email;

}


document.getElementById("editForm").onsubmit = async function(e){

e.preventDefault();


let response = await fetch(
"/business/edit/" + businessId,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

name: document.getElementById("editName").value,

email: document.getElementById("editEmail").value

})

});


let result = await response.json();

alert(result.message);

loadBusiness();

}


loadBusinessDetails();


</script>


</body>

</html>
